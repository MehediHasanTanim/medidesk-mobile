name: medidesk
description: MediDesk — offline-first clinic management mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Offline-first database
  drift: ^2.20.2
  drift_flutter: ^0.2.1

  # Sync / background
  workmanager: ^0.9.0
  connectivity_plus: ^6.0.5

  # Crypto / identity
  uuid: ^4.4.2

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Preferences
  shared_preferences: ^2.3.2

  # Timezone
  timezone: ^0.9.4

  # Forms
  reactive_forms: ^17.0.1

  # File handling
  file_picker: ^8.1.2

  # Code-gen runtime support
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.2.1

  # Misc
  intl: ^0.20.0
  path_provider: ^2.1.4
  path: ^1.9.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  drift_dev: ^2.20.2
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

dependency_overrides:
  analyzer_plugin: ">=0.13.0 <0.15.0"

flutter:
  uses-material-design: true
